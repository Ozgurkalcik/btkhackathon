name: finance_expert
description: "AI tabanlı finansal asistan — Clean Architecture + BLoC"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # ─── UI ───
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  intl: ^0.20.2

  # ─── State Management ───
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # ─── Dependency Injection ───
  get_it: ^8.0.3

  # ─── Network ───
  http: ^1.4.0

  # ─── AI ───
  google_generative_ai: any

  # ─── Security ───
  flutter_secure_storage: ^9.2.4
  local_auth: ^2.3.0
  encrypt: ^5.0.3
  crypto: ^3.0.6

  # ─── Local Storage ───
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # ─── Utils ───
  uuid: ^4.5.1
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
